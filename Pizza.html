<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Noma's Pizza – Overzicht</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Pizza Overzicht</h1>
  <a href="dashboard.html" class="btn-primary">Bestellen</a>
</header>

<main class="pizza-grid">
  <div class="pizza-card">
    <img src="img/shoarma.jpg" alt="Shoarma Pizza">
    <h2>Shoarma</h2>
    <p>Rijke shoarma, knoflooksaus, rode ui.</p>
    <span class="price">€5</span>
  </div>

  <div class="pizza-card">
    <img src="img/margarita.jpg" alt="Margherita Pizza">
    <h2>Margherita</h2>
    <p>Tomatensaus, mozzarella, basilicum.</p>
    <span class="price">€5</span>
  </div>

  <div class="pizza-card">
    <img src="img/tonijn.jpg" alt="Tonijn Pizza">
    <h2>Tonijn</h2>
    <p>Tonijn, rode ui, olijven.</p>
    <span class="price">€5</span>
  </div>
</main>

</body>
</html>
