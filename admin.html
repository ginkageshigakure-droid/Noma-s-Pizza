<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Noma's Pizza - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

  <div class="admin-container">
    <h1>Admin Paneel</h1>
    <p class="admin-sub">Beheer pizza’s en prijzen</p>

    <div class="admin-login" id="admin-login">
      <input type="password" id="admin-code" placeholder="Geheime admin code">
      <button id="admin-enter" class="btn-primary">Inloggen</button>
      <p id="admin-error" class="admin-error"></p>
    </div>

    <div id="admin-panel" class="admin-panel hidden">
      <h2>Pizza’s aanpassen</h2>

      <div id="pizza-editor"></div>

      <button id="save-admin" class="btn-primary">Opslaan</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
